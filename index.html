<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day 💐</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --rose: #e8445a; --blush: #f9c8d4; --petal: #f4a0b5;
    --deep: #8b1a2f; --lavender: #c9a7d6; --gold: #d4a843;
    --cream: #fff8f2; --mint: #a8d5bc;
  }
  body { font-family: 'Lora', serif; background: var(--cream); overflow: hidden; cursor: none; height: 100vh; }

  .cursor { position: fixed; width: 18px; height: 18px; background: var(--rose); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: multiply; }
  .cursor-trail { position: fixed; width: 7px; height: 7px; border: 2px solid var(--petal); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); opacity: 0.7; }

  #petal-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

  .hearts-container { position: fixed; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
  .heart { position: absolute; bottom: -60px; opacity: 0; }
  @keyframes heart-rise {
    0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) rotate(720deg) scale(1.2); opacity: 0; }
  }

  .ribbon { position: fixed; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--rose), var(--lavender), var(--gold), var(--mint), var(--rose)); background-size: 300% 100%; animation: rainbow 3s linear infinite; z-index: 100; }
  @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

  .hero { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(160deg, #fff0f5 0%, #ffe8ef 45%, #ffd6e4 100%); overflow: hidden; z-index: 2; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 45%, rgba(232,68,90,0.10) 0%, transparent 70%); animation: pulse-bg 4s ease-in-out infinite; }
  @keyframes pulse-bg { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.08); } }

  .flower-ring { position: absolute; width: 700px; height: 700px; top: 50%; left: 50%; margin: -350px 0 0 -350px; animation: spin 30s linear infinite; }
  .flower-ring-inner { position: absolute; width: 440px; height: 440px; top: 50%; left: 50%; margin: -220px 0 0 -220px; animation: spin 20s linear infinite reverse; }
  .flower-ring span, .flower-ring-inner span { position: absolute; top: 50%; left: 50%; transform-origin: 0 0; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .hero-title { position: relative; z-index: 5; text-align: center; animation: float 3.5s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

  .title-happy { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1.6rem,4.5vw,3.2rem); color: var(--deep); letter-spacing: 0.08em; opacity: 0; animation: slide-up 0.9s ease forwards 0.3s; }
  .title-main { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(3.5rem,11vw,9rem); line-height: 1; background: linear-gradient(135deg, var(--rose) 0%, #c2185b 40%, var(--deep) 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; opacity: 0; animation: slide-up 0.9s ease forwards 0.55s, shimmer 5s linear infinite 1.8s; }
  @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
  .title-day { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(2.5rem,8vw,6.5rem); color: var(--gold); letter-spacing: 0.18em; opacity: 0; animation: slide-up 0.9s ease forwards 0.8s; }
  @keyframes slide-up { from { opacity: 0; transform: translateY(36px); } to { opacity: 1; transform: translateY(0); } }

  .hero-sub { position: relative; z-index: 5; font-style: italic; font-size: clamp(0.95rem,2.2vw,1.3rem); color: #9b3a5a; margin-top: 1.4rem; opacity: 0; animation: slide-up 0.9s ease forwards 1.1s; text-align: center; padding: 0 2rem; max-width: 520px; }

  .confetti-piece { position: fixed; pointer-events: none; z-index: 9999; animation: confetti-fall linear forwards; }
  @keyframes confetti-fall { 0% { opacity: 1; } 100% { transform: translateY(80vh) rotate(720deg); opacity: 0; } }

  footer { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(90deg, var(--deep), #c2185b, var(--deep)); background-size: 200% 100%; animation: footer-shift 6s ease-in-out infinite; color: white; text-align: center; padding: 0.9rem 1rem; z-index: 10; }
  @keyframes footer-shift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(0.9rem,2.5vw,1.2rem); animation: glow 2.5s ease-in-out infinite; }
  @keyframes glow { 0%,100% { text-shadow: 0 0 8px rgba(255,255,255,0.2); } 50% { text-shadow: 0 0 24px rgba(255,200,200,0.9), 0 0 50px rgba(255,100,150,0.4); } }

  @media (max-width: 600px) {
    .flower-ring { width: 340px; height: 340px; margin: -170px 0 0 -170px; }
    .flower-ring-inner { width: 220px; height: 220px; margin: -110px 0 0 -110px; }
  }
</style>
</head>
<body>

<div class="ribbon"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>
<div class="hearts-container" id="hearts"></div>
<canvas id="petal-canvas"></canvas>

<section class="hero" onclick="explodeConfetti(event)">
  <div class="flower-ring" id="ring1"></div>
  <div class="flower-ring-inner" id="ring2"></div>
  <div class="hero-title">
    <div class="title-happy">Happy</div>
    <div class="title-main">Mother's</div>
    <div class="title-day">Day</div>
  </div>
  <p class="hero-sub">To the most extraordinary woman in my world — I love you, Mom 💗</p>
</section>

<footer><p>💐 Celebrating you today, tomorrow & always 💐</p></footer>

<script>
// Cursor
const cursor = document.getElementById('cursor');
const cursorTrail = document.getElementById('cursorTrail');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; });
setInterval(() => { tx+=(mx-tx)*0.15; ty+=(my-ty)*0.15; cursorTrail.style.left=tx+'px'; cursorTrail.style.top=ty+'px'; }, 16);

// Flower rings
const ring1=document.getElementById('ring1'), ring2=document.getElementById('ring2');
['🌹','🌸','💐','🌺','🌷','🌼','💮','🏵️','🌻','🌹','🌸','💐'].forEach((f,i,a)=>{
  const ang=(i/a.length)*2*Math.PI, s=document.createElement('span');
  s.textContent=f; s.style.cssText=`transform:translate(${Math.cos(ang)*320}px,${Math.sin(ang)*320}px);font-size:clamp(1.1rem,2.2vw,2rem);`;
  ring1.appendChild(s);
});
['💗','✨','💝','⭐','💫','🌟','💖','✨'].forEach((f,i,a)=>{
  const ang=(i/a.length)*2*Math.PI, s=document.createElement('span');
  s.textContent=f; s.style.cssText=`transform:translate(${Math.cos(ang)*190}px,${Math.sin(ang)*190}px);font-size:clamp(0.9rem,1.8vw,1.5rem);`;
  ring2.appendChild(s);
});

// Hearts
const hc=document.getElementById('hearts');
const heartEmojis=['💗','💖','💝','💕','❤️','🌸','✨','💓'];
function spawnHeart(){
  const h=document.createElement('div'); h.className='heart';
  h.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
  const dur=7+Math.random()*7;
  h.style.cssText=`left:${Math.random()*100}%;font-size:${0.8+Math.random()*1.4}rem;animation:heart-rise ${dur}s linear forwards;`;
  hc.appendChild(h); setTimeout(()=>h.remove(),dur*1000);
}
setInterval(spawnHeart,700);

// Petals
const canvas=document.getElementById('petal-canvas'), ctx=canvas.getContext('2d');
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); window.addEventListener('resize',resize);
const cols=['#f4a0b5','#f9c8d4','#e8445a','#c9a7d6','#d4a843'];
const petals=Array.from({length:30},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  size:6+Math.random()*10, speed:0.8+Math.random()*1.8,
  drift:(Math.random()-0.5)*1.4, rot:Math.random()*Math.PI*2,
  rotSpeed:(Math.random()-0.5)*0.04, opacity:0.35+Math.random()*0.5,
  color:cols[Math.floor(Math.random()*cols.length)]
}));
(function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>{
    p.y+=p.speed; p.x+=p.drift+Math.sin(p.y*0.018)*0.8; p.rot+=p.rotSpeed;
    if(p.y>canvas.height+20){ p.y=-20; p.x=Math.random()*canvas.width; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*0.55,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(loop);
})();

// Confetti on click
const ccols=['#e8445a','#f9c8d4','#c9a7d6','#d4a843','#a8d5bc','#f4a0b5','#8b1a2f'];
function explodeConfetti(e){
  for(let i=0;i<40;i++){
    const c=document.createElement('div'); c.className='confetti-piece';
    const ang=Math.random()*360, vel=80+Math.random()*150, sz=6+Math.random()*10;
    c.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;background:${ccols[Math.floor(Math.random()*ccols.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation:confetti-fall ${0.7+Math.random()*0.9}s ease-out forwards;transform:translate(${Math.cos(ang*Math.PI/180)*vel}px,${Math.sin(ang*Math.PI/180)*vel}px);`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),1600);
  }
}
</script>
</body>
</html>
