<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Study Plan</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #d9a7c7, #fffcdc);
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 2.5rem;
    }
    .card {
      background: #ffffffdd;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      max-width: 600px;
      width: 100%;
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: scale(1.01);
    }
    .date {
      font-size: 22px;
      font-weight: bold;
      color: #6c5ce7;
      text-align: center;
      margin-bottom: 25px;
    }
    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f1f2f6;
      padding: 12px 18px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: background 0.2s ease;
    }
    .task:hover {
      background: #dcdde1;
    }
    .task label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      color: #2d3436;
    }
    .task input[type="checkbox"] {
      transform: scale(1.3);
      cursor: pointer;
    }
    .no-task {
      text-align: center;
      color: #888;
      font-style: italic;
    }
    .button-container {
      margin-top: 30px;
    }
    .redirect-button {
      background-color: #6c5ce7;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .redirect-button:hover {
      background-color: #4834d4;
    }
  </style>
</head>
<body>
  <h1>Today's Study Plan</h1>
  <div class="card" id="today-card">
    <div class="date" id="today-date"></div>
    <div id="tasks"></div>
  </div>

  <div class="button-container">
    <button class="redirect-button" onclick="window.location.href='table.html'">View Full Schedule</button>
  </div>

  <script>
    const schedule = {
      "24 June": ["Web D: 25(210-211)", "Sec+: 15", "Linux: 102-108", "Sec+ Practice: Security control"],
      "25 June": ["Web D: 25(212-213)", "Sec+: 16", "Linux: 109-115", "Sec+ Practice: Encryption"],
      "26 June": ["Web D: 26", "Sec+: 16", "Linux: 116-123", "Sec+ Practice: Hashing"],
      "27 June": ["Web D: 27", "Sec+: 17", "Linux: 124-133"],
      "28 June": ["Web D: 27", "Sec+: 17-18", "Linux: 134-140"],
      "29 June": ["Web D: 28", "Sec+: 18", "Linux: 7"],
      "30 June": ["Web D: 28", "Sec+: 19", "Linux: 7"],
      "1 July": ["Web D: 29", "Sec+: 20", "Linux: 7"],
      "2 July": ["Web D: 30", "Sec+: 21", "Linux: 7"],
      "3 July": ["Web D: 30", "Sec+: 22", "Linux: 7"],
      "4 July": ["Web D: 31-32", "Sec+: 22-23", "Linux: 7"],
      "5 July": ["Web D: 33", "Sec+: 23", "Linux: 7"],
      "6 July": ["Web D: 33", "Sec+: 24", "Linux: 7"],
      "7 July": ["Web D: 33", "Sec+: 25", "Linux: 8"],
      "8 July": ["Web D: 33", "Sec+: 26", "Linux: 8"],
      "9 July": ["Web D: 34", "Sec+: 27-28-29", "Linux: 8"],
      "10 July": ["Web D: 35", "Linux: 8"],
      "11 July": ["Web D: 35", "Linux: 8"]
    };

    const today = new Date();
    const options = { day: '2-digit', month: 'long' };
    const todayStr = today.toLocaleDateString('en-GB', options);

    document.getElementById("today-date").textContent = todayStr;
    const tasksDiv = document.getElementById("tasks");
    const tasks = schedule[todayStr];

    function saveState(id, value) {
      localStorage.setItem(id, value);
    }

    function loadState(id) {
      return localStorage.getItem(id) === 'true';
    }

    if (tasks && tasks.length > 0) {
      tasks.forEach((task, index) => {
        const taskId = `task-${todayStr}-${index}`;
        const checked = loadState(taskId);
        const div = document.createElement("div");
        div.classList.add("task");
        div.innerHTML = `
          <label>
            <input type="checkbox" id="${taskId}" ${checked ? 'checked' : ''}/>
            <span>${task}</span>
          </label>
        `;
        div.querySelector('input').addEventListener('change', (e) => {
          saveState(taskId, e.target.checked);
        });
        tasksDiv.appendChild(div);
      });
    } else {
      tasksDiv.innerHTML = '<div class="no-task">No tasks scheduled for today.</div>';
    }
  </script>
</body>
</html>
